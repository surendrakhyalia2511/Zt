<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ZeroTrust Home</title>
<link rel="manifest" href="/manifest.json">
<script src="/static/react.min.js"></script>
<script src="/static/react-dom.min.js"></script>
<script src="/static/babel.min.js"></script>
<style>
/* ── Design System: Claude / Anthropic — Light Mode ── */
:root {
  /* Light-theme surfaces — warm parchment palette */
  --bg:#f5f4ed;           /* Parchment — primary page background */
  --surface:#faf9f5;      /* Ivory — card/elevated surface */
  --surface2:#ffffff;     /* Pure white — max contrast element */
  --border:#e8e6dc;       /* Border Warm */
  --border-subtle:#f0eee6; /* Border Cream */

  /* Semantic status colours — warm palette */
  --accent:#c96442;       /* Terracotta Brand — primary / trust */
  --accent2:#5e9456;      /* Warm green — safe / secure */
  --warn:#c98a42;         /* Warm amber — at-risk */
  --danger:#b53333;       /* Error Crimson — threat */

  /* Text on light surfaces */
  --text:#141413;         /* Anthropic Near Black */
  --textdim:#4d4c48;      /* Charcoal Warm */
  --muted:#87867f;        /* Stone Gray */
  --muted2:#5e5d59;       /* Olive Gray */

  /* Ring shadow system */
  --shadow:rgba(0,0,0,0.05) 0px 4px 24px;   /* whisper shadow */
  --shadow-ring:0 0 0 1px #e8e6dc;           /* ring border */

  --radius:16px;
  --radius-sm:10px;
  --radius-btn:12px;
}

/* ── Reset ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  line-height:1.6;
}
#root{height:100%;display:flex;flex-direction:column}

/* ── Login ── */
.login-screen{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 24px;
  background:#f5f4ed;
  min-height:100vh;
}
.login-logo{
  width:80px;height:80px;
  background:#c96442;
  border-radius:24px;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;margin-bottom:24px;
  box-shadow:0 0 0 1px #d1cfc5,0 8px 32px rgba(201,100,66,0.2);
}
.login-title{
  font-size:28px;font-weight:500;
  font-family:Georgia,"Times New Roman",serif;
  color:#141413;
  margin-bottom:6px;letter-spacing:-0.3px;line-height:1.1;
}
.login-sub{
  font-size:12px;color:#87867f;
  margin-bottom:40px;letter-spacing:0.5px;text-transform:uppercase;
}
.login-form{width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px}
.login-input{
  background:#ffffff;
  border:1px solid #e8e6dc;
  border-radius:var(--radius-btn);
  padding:14px 16px;font-size:16px;
  color:#141413;
  outline:none;transition:border-color 0.2s,box-shadow 0.2s;
  -webkit-appearance:none;
}
.login-input::placeholder{color:#b0aea5}
.login-input:focus{border-color:#c96442;box-shadow:0 0 0 3px rgba(201,100,66,0.1)}
.login-btn{
  background:#c96442;
  color:#faf9f5;
  border:none;border-radius:var(--radius-btn);
  padding:15px;font-size:16px;font-weight:600;
  cursor:pointer;margin-top:4px;transition:all 0.15s;
  box-shadow:0 0 0 1px #b85a38;
}
.login-btn:active{transform:scale(0.98);background:#b85a38}
.login-btn:disabled{opacity:0.55}
.login-error{text-align:center;color:#b53333;font-size:13px;padding:8px}

/* ── App shell ── */
.app{height:100%;display:flex;flex-direction:column}

/* ── Header ── */
.header{
  background:rgba(245,244,237,0.96);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;position:sticky;top:0;z-index:50;
  box-shadow:0 0 0 1px var(--border-subtle),var(--shadow);
  backdrop-filter:blur(16px);
}
.header-logo{display:flex;align-items:center;gap:10px}
.header-icon{
  width:36px;height:36px;
  background:#c96442;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 0 0 1px rgba(201,100,66,0.35);
}
.header-title{
  font-size:17px;font-weight:500;
  font-family:Georgia,"Times New Roman",serif;
  color:#141413;
  letter-spacing:-0.2px;
}
.header-sub{font-size:11px;color:var(--muted)}
.header-status{
  display:flex;align-items:center;gap:6px;
  padding:5px 11px;border-radius:20px;
  font-size:12px;font-weight:600;
}
.status-secure{background:rgba(94,148,86,0.1);color:var(--accent2);box-shadow:0 0 0 1px rgba(94,148,86,0.25)}
.status-alert{background:rgba(181,51,51,0.08);color:var(--danger);box-shadow:0 0 0 1px rgba(181,51,51,0.2)}

/* ── Pulse dot ── */
.pulse{width:7px;height:7px;border-radius:50%;animation:pulse 2s infinite}
.pulse-green{background:var(--accent2);box-shadow:0 0 5px var(--accent2)}
.pulse-red{background:var(--danger);box-shadow:0 0 5px var(--danger)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.35;transform:scale(0.75)}}

/* ── Content ── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:80px}

/* ── Stat row ── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.stat-card{
  background:var(--surface);
  border-radius:var(--radius-sm);
  padding:14px 10px;text-align:center;
  box-shadow:var(--shadow-ring);
  border:1px solid var(--border);
}
.stat-val{
  font-size:26px;font-weight:700;
  font-family:Georgia,"Times New Roman",serif;
  line-height:1.1;margin-bottom:3px;
}
.stat-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:0.5px;text-transform:uppercase}

.color-blue{color:var(--accent)}
.color-green{color:var(--accent2)}
.color-warn{color:var(--warn)}
.color-danger{color:var(--danger)}

/* ── Section headers ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:4px}
.section-title{font-size:11px;font-weight:600;color:var(--muted2);letter-spacing:0.5px;text-transform:uppercase}
.section-count{
  font-size:11px;color:var(--muted);
  background:var(--border);padding:2px 8px;border-radius:10px;
}

/* ── Zone badges ── */
.lan-zone{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:6px;
  font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:10px;
}
.zone-iot{background:rgba(201,100,66,0.08);color:var(--accent);border:1px solid rgba(201,100,66,0.2)}
.zone-quar{background:rgba(181,51,51,0.08);color:var(--danger);border:1px solid rgba(181,51,51,0.2)}

/* ── Device list ── */
.device-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.device-row{
  background:var(--surface);
  border-radius:var(--radius-sm);
  padding:14px 16px;
  display:flex;align-items:center;gap:14px;
  box-shadow:var(--shadow-ring);
  transition:all 0.15s;cursor:pointer;
  border:1px solid var(--border);
}
.device-row:active{transform:scale(0.99)}
.device-row.quarantined{border-color:rgba(181,51,51,0.3);background:rgba(181,51,51,0.025)}
.device-row.at-risk{border-color:rgba(201,138,66,0.3);background:rgba(201,138,66,0.02)}
.device-icon-wrap{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.icon-normal{background:rgba(201,100,66,0.08)}
.icon-quarantine{background:rgba(181,51,51,0.08)}
.icon-warn{background:rgba(201,138,66,0.08)}
.device-info{flex:1;min-width:0}
.device-name{font-size:15px;font-weight:500;color:#141413;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.device-meta{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.device-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}

/* ── Score badges ── */
.score-badge{padding:3px 9px;border-radius:8px;font-size:13px;font-weight:700}
.score-good{background:rgba(94,148,86,0.1);color:var(--accent2)}
.score-warn{background:rgba(201,138,66,0.1);color:var(--warn)}
.score-bad{background:rgba(181,51,51,0.1);color:var(--danger)}

/* ── Status dots ── */
.status-dot{width:8px;height:8px;border-radius:50%}
.dot-green{background:var(--accent2)}
.dot-red{background:var(--danger)}
.dot-warn{background:var(--warn)}
.dot-gray{background:#b0aea5}

/* ── Bottom sheet ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(20,20,19,0.4);z-index:200;backdrop-filter:blur(4px);animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:#faf9f5;
  border-radius:24px 24px 0 0;
  border-top:1px solid var(--border);
  padding:0 0 32px;z-index:201;
  animation:slideUp 0.3s cubic-bezier(0.32,0.72,0,1);
  max-height:90vh;overflow-y:auto;
  box-shadow:0 -4px 32px rgba(0,0,0,0.08);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 20px}
.sheet-icon{font-size:48px;text-align:center;margin-bottom:8px}
.sheet-name{
  font-size:22px;font-weight:500;
  font-family:Georgia,"Times New Roman",serif;
  color:#141413;
  text-align:center;margin-bottom:4px;
}
.sheet-type{font-size:13px;color:var(--muted);text-align:center;margin-bottom:20px}
.sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:16px}
.sheet-stat{
  background:#ffffff;
  border-radius:var(--radius-sm);padding:12px;text-align:center;
  border:1px solid var(--border);
  box-shadow:var(--shadow-ring);
}
.sheet-stat-val{font-size:20px;font-weight:700;margin-bottom:3px}
.sheet-stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.sheet-actions{display:flex;flex-direction:column;gap:10px;padding:0 16px;margin-top:16px}
.action-btn{
  width:100%;padding:15px;border-radius:var(--radius-btn);
  border:none;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.15s;
}
.action-btn:active{transform:scale(0.98)}
.btn-quarantine{background:#b53333;color:#faf9f5;box-shadow:0 0 0 1px #922828}
.btn-restore{background:#5e9456;color:#faf9f5;box-shadow:0 0 0 1px #4a7a43}
.btn-cancel{background:var(--border);color:var(--textdim);border:1px solid var(--border)}
.sheet-info-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;border-bottom:1px solid var(--border-subtle);font-size:14px;
}
.sheet-info-label{color:var(--muted)}
.sheet-info-val{font-weight:600;font-family:"SFMono-Regular",Consolas,monospace;font-size:13px;color:var(--textdim)}

/* ── Alerts ── */
.alert-list{display:flex;flex-direction:column;gap:8px}
.alert-card{
  background:var(--surface);
  border-radius:var(--radius-sm);padding:12px 14px;
  box-shadow:var(--shadow-ring);
  border-left:3px solid;
  border-top:1px solid var(--border-subtle);
  border-right:1px solid var(--border-subtle);
  border-bottom:1px solid var(--border-subtle);
  animation:slideIn 0.3s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.alert-quar{border-left-color:var(--danger)}
.alert-atk{border-left-color:var(--danger)}
.alert-rate{border-left-color:var(--warn)}
.alert-info{border-left-color:var(--accent)}
.alert-join{border-left-color:var(--accent2)}
.alert-left{border-left-color:var(--muted)}
.alert-time{font-size:11px;color:var(--muted);margin-bottom:3px}
.alert-msg{font-size:13px;line-height:1.6;color:var(--textdim)}

/* ── Bottom nav ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(245,244,237,0.97);
  border-top:1px solid var(--border);
  display:flex;padding:8px 0;
  padding-bottom:max(8px,env(safe-area-inset-bottom));
  z-index:100;
  box-shadow:0 0 0 1px var(--border-subtle);
  backdrop-filter:blur(16px);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:4px;cursor:pointer;transition:all 0.15s;
  background:none;border:none;-webkit-appearance:none;position:relative;
}
.nav-item:active{transform:scale(0.9)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;font-weight:600;letter-spacing:0.3px;color:var(--muted)}
.nav-item.active .nav-label{color:var(--accent)}
.nav-dot{position:absolute;top:2px;right:18px;width:8px;height:8px;background:var(--danger);border-radius:50%;border:2px solid var(--bg)}

/* ── Loading ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:12px;color:var(--muted);font-size:14px}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Empty state ── */
.empty{text-align:center;padding:32px 16px;color:var(--muted);font-size:14px;line-height:1.6}
.empty-icon{font-size:40px;margin-bottom:10px}

/* ── Scrollbar hide ── */
.content::-webkit-scrollbar,.sheet::-webkit-scrollbar{display:none}

/* ── Chart cards ── */
.chart-card{
  background:var(--surface);
  border:1px solid var(--border-subtle);
  border-radius:var(--radius);
  padding:16px;margin-bottom:14px;
  box-shadow:var(--shadow);
}
.chart-title{
  font-size:11px;font-weight:600;
  color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;
  margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;
}
.chart-val{
  font-size:22px;font-weight:700;
  font-family:Georgia,"Times New Roman",serif;
  color:var(--accent);
}

/* ── Network / zone cards ── */
.network-map{background:var(--surface);border:1px solid var(--border-subtle);border-radius:var(--radius);padding:12px;margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow)}
.zone-card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border-subtle)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;
const API='';

function calcScore(d){
  let s=100; s-=20;
  if(!d.vendor||d.vendor.includes('Unknown')||d.vendor.includes('locally'))s-=10;
  if(d.scanning)s-=50; if(d.under_attack)s-=40;
  if(d.connections>10)s-=20; else if(d.connections>5)s-=10;
  if(d.east_west)s-=50; if(d.quarantined_before)s-=10;
  if(d.quarantined)s-=30; if(d.rl_penalty>0)s-=d.rl_penalty;
  return Math.max(0,s);
}
function scoreColor(s){return s>=60?'var(--accent2)':s>=40?'var(--warn)':'var(--danger)'}
function scoreClass(s){return s>=60?'score-good':s>=40?'score-warn':'score-bad'}
function parseAlertType(r){
  if(r.includes('QUARANTINED'))return'quar';
  if(r.includes('ATTACKER')||r.includes('SCANNING'))return'atk';
  if(r.includes('SCORE_DROP')||r.includes('RATE'))return'rate';
  if(r.includes('DEVICE_JOINED')||r.includes('NEW DEVICE'))return'join';
  if(r.includes('DEVICE_LEFT')||r.includes('LEFT NETWORK'))return'left';
  return'info';
}
function cleanMsg(r){
  return r.replace(/\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\s*/,'')
    .replace(/\{.*?\}/g,'').replace(/\|+/g,'|')
    .replace(/[🔒📉🚨ℹ️⚠️]/g,'').trim().slice(0,300);
}
function authFetch(url,opts={}){
  const token=window._zt_token||sessionStorage.getItem('zt_token')||'';
  const headers={...(opts.headers||{})};
  if(token)headers['Authorization']=`Bearer ${token}`;
  return fetch(url,{...opts,headers});
}
const FRIENDLY={
  cam1:'Front Door Camera',lock1:'Smart Door Lock',nas:'Home Storage',
  badge:'Badge Reader',plug1:'Smart Plug',chromecast:'Chromecast',bulb1:'Smart Bulb',
  envsensor:'Env Sensor',nvr:'Security Recorder',thermo1:'Thermostat',tv1:'Smart TV',
  sensorhub:'Sensor Hub',lighting:'Lighting Controller',energymeter:'Energy Monitor',printer:'Home Printer'
};
const ICONS={
  cam1:'📷',lock1:'🔒',nas:'💾',badge:'🪪',plug1:'🔌',chromecast:'📺',
  bulb1:'💡',envsensor:'🌿',nvr:'🎥',thermo1:'🌡️',tv1:'📺',sensorhub:'🔗',
  lighting:'💡',energymeter:'⚡',printer:'🖨️'
};
const TYPE_ICONS={'Network Printer':'🖨️','IP Camera / NVR':'📷','MQTT Sensor/Actuator':'📡','HTTP Device':'📱'};
function enrich(d){
  return{...d,
    friendly_name:FRIENDLY[d.name]||d.name,
    icon:ICONS[d.name]||TYPE_ICONS[d.type]||'📱',
    manufacturer:d.vendor?.includes('locally')?'Virtual':d.vendor||'Unknown',
  };
}

function Sparkline({data,width=80,height=28,color}){
  if(!data||data.length<2)return<span style={{fontSize:11,color:'var(--muted)'}}>—</span>;
  const vals=data.map(p=>p.score||p);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const range=mx-mn||1;
  const pts=vals.map((v,i)=>{
    const x=(i/(vals.length-1))*width;
    const y=height-((v-mn)/range)*(height-4)-2;
    return`${x},${y}`;
  }).join(' ');
  return(
    <svg width={width} height={height} style={{overflow:'visible'}}>
      <polyline points={pts} fill="none" stroke={color||'var(--accent)'} strokeWidth="2" strokeLinejoin="round"/>
      <circle cx={parseFloat(pts.split(' ').pop().split(',')[0])}
              cy={parseFloat(pts.split(' ').pop().split(',')[1])}
              r="3" fill={color||'var(--accent)'}/>
    </svg>
  );
}

function BarChart({data,height=80,color}){
  if(!data||!data.length)return<div className="empty" style={{padding:16}}>No data</div>;
  const max=Math.max(...data.map(d=>d.value),1);
  const barW=Math.max(6,Math.floor((300-data.length*2)/data.length));
  return(
    <svg width="100%" height={height+24} viewBox={`0 0 ${Math.max(300,data.length*(barW+3))} ${height+24}`} preserveAspectRatio="none">
      {data.map((d,i)=>{
        const h=Math.max(2,(d.value/max)*(height-4));
        const x=i*(barW+3);
        return(
          <g key={i}>
            <rect x={x} y={height-h} width={barW} height={h}
              fill={d.color||color||'var(--accent)'} rx="2" opacity="0.85"/>
          </g>
        );
      })}
    </svg>
  );
}

function LineChart({points,height=80,color,fill}){
  if(!points||points.length<2)return<div className="empty" style={{padding:8}}>No data yet</div>;
  const vals=points.map(p=>p.y);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const range=mx-mn||1;
  const W=300,H=height;
  const coords=points.map((p,i)=>{
    const x=(i/(points.length-1))*(W-4)+2;
    const y=H-((p.y-mn)/range)*(H-8)-4;
    return[x,y];
  });
  const pathD='M'+coords.map(c=>c.join(',')).join(' L');
  const areaD=pathD+` L${coords[coords.length-1][0]},${H} L${coords[0][0]},${H} Z`;
  return(
    <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
      {fill&&<path d={areaD} fill={color||'var(--accent)'} opacity="0.1"/>}
      <path d={pathD} fill="none" stroke={color||'var(--accent)'} strokeWidth="2"/>
      {coords.map((c,i)=>(
        <circle key={i} cx={c[0]} cy={c[1]} r="3" fill={color||'var(--accent)'}/>
      ))}
    </svg>
  );
}

function DonutChart({segments,size=100}){
  const total=segments.reduce((a,s)=>a+s.value,0)||1;
  let angle=-90;
  const R=36,cx=50,cy=50;
  const paths=segments.map(s=>{
    const pct=s.value/total;
    const a=pct*360;
    const start=angle;
    angle+=a;
    const r=start*(Math.PI/180),r2=angle*(Math.PI/180);
    const x1=cx+R*Math.cos(r),y1=cy+R*Math.sin(r);
    const x2=cx+R*Math.cos(r2),y2=cy+R*Math.sin(r2);
    const large=a>180?1:0;
    return{...s,d:`M${cx},${cy} L${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} Z`};
  });
  return(
    <svg width={size} height={size} viewBox="0 0 100 100">
      {paths.map((p,i)=><path key={i} d={p.d} fill={p.color} opacity="0.85"/>)}
      <circle cx={50} cy={50} r={20} fill="#faf9f5"/>
    </svg>
  );
}

function NetworkMap({devices}){
  const iot=devices.filter(d=>!d.quarantined&&d.lan==='iot-lan');
  const trusted=devices.filter(d=>d.lan==='c-devices');
  const quar=devices.filter(d=>d.quarantined);
  const COLS=5,DSX=68,DSY=50,PAD=22;
  const GW_X=38,LAN_X=130,HUB_W=112,HUB_H=38;
  const HUB_CX=LAN_X+HUB_W/2;
  const DEV_X=HUB_CX+HUB_W/2+28;
  const SPINE_X=DEV_X-20;
  const rowsOf=n=>Math.max(1,Math.ceil(n/COLS));
  const blockH=n=>rowsOf(n)*DSY;
  const iotH=blockH(iot.length);
  const quarH=blockH(Math.max(quar.length,1));
  const trustedH=blockH(Math.max(trusted.length,1));
  const iotY=PAD+iotH/2;
  const quarY=iotY+iotH/2+PAD+quarH/2;
  const trustedY=quarY+quarH/2+PAD+trustedH/2;
  const SVG_H=Math.max(260,trustedY+trustedH/2+PAD);
  const GW_Y=SVG_H/2;
  const lans=[
    {label:'IoT LAN',subnet:'192.168.20.0/24',devs:iot,color:'var(--accent)',bg:'rgba(201,100,66,0.07)',icon:'📶',y:iotY},
    {label:'Isolated',subnet:'192.168.30.0/24',devs:quar,color:'var(--danger)',bg:'rgba(181,51,51,0.07)',icon:'🔒',y:quarY},
    {label:'Trusted',subnet:'192.168.10.0/24',devs:trusted,color:'var(--accent2)',bg:'rgba(94,148,86,0.07)',icon:'💻',y:trustedY},
  ];
  return(
    <svg width="100%" height={SVG_H} viewBox={`0 0 760 ${SVG_H}`} style={{overflow:'visible'}}>
      <circle cx={GW_X} cy={GW_Y} r={22} fill="#faf9f5" stroke="var(--accent)" strokeWidth="2"/>
      <text x={GW_X} y={GW_Y+1} textAnchor="middle" dominantBaseline="middle" fontSize="16">🛡</text>
      <text x={GW_X} y={GW_Y+33} textAnchor="middle" fontSize="8" fill="var(--accent)" fontWeight="bold">Gateway</text>
      {lans.map((lan,li)=>{
        const lanY=lan.y;
        const numRows=Math.ceil(Math.max(lan.devs.length,1)/COLS);
        const startRowY=lanY-(numRows-1)*DSY/2;
        const endRowY=startRowY+(numRows-1)*DSY;
        return(
          <g key={li}>
            <path d={`M${GW_X+22},${GW_Y} C${LAN_X-20},${GW_Y} ${LAN_X-20},${lanY} ${LAN_X},${lanY}`}
              fill="none" stroke={lan.color} strokeWidth="1.5" strokeOpacity="0.3"
              strokeDasharray={lan.devs.length===0?"5,3":"0"}/>
            <rect x={LAN_X} y={lanY-HUB_H/2} width={HUB_W} height={HUB_H} rx={8}
              fill={lan.bg} stroke={lan.color} strokeWidth="1.5" strokeOpacity="0.55"/>
            <text x={LAN_X+12} y={lanY+5} fontSize="14" dominantBaseline="middle">{lan.icon}</text>
            <text x={LAN_X+30} y={lanY-6} fontSize="9" fill={lan.color} fontWeight="bold">{lan.label}</text>
            <text x={LAN_X+30} y={lanY+6} fontSize="7" fill="var(--textdim)">{lan.subnet}</text>
            <text x={LAN_X+HUB_W-6} y={lanY+4} textAnchor="end" fontSize="10" fill={lan.color} fontWeight="bold">{lan.devs.length}</text>
            {lan.devs.length>0&&(
              <g>
                <line x1={LAN_X+HUB_W} y1={lanY} x2={SPINE_X} y2={lanY} stroke={lan.color} strokeWidth="1" strokeOpacity="0.22"/>
                {numRows>1&&(<line x1={SPINE_X} y1={startRowY} x2={SPINE_X} y2={endRowY} stroke={lan.color} strokeWidth="1" strokeOpacity="0.2"/>)}
                {Array.from({length:numRows}).map((_,ri)=>{
                  const ry=startRowY+ri*DSY;
                  const rowDevs=lan.devs.slice(ri*COLS,(ri+1)*COLS);
                  return(
                    <g key={ri}>
                      <line x1={SPINE_X} y1={ry} x2={DEV_X-14} y2={ry} stroke={lan.color} strokeWidth="1" strokeOpacity="0.2"/>
                      {rowDevs.map((d,ci)=>{
                        const dx=DEV_X+ci*DSX;
                        const s=calcScore(d);
                        const dc=d.quarantined?'var(--danger)':d.active===false?'#555':scoreColor(s);
                        const isInact=d.active===false;
                        return(
                          <g key={ci} opacity={isInact?0.35:1}>
                            {ci>0&&(<line x1={DEV_X+(ci-1)*DSX+14} y1={ry} x2={dx-14} y2={ry} stroke={lan.color} strokeWidth="1" strokeOpacity="0.15"/>)}
                            <circle cx={dx} cy={ry} r={14} fill={isInact?'#f5f4ed':'#faf9f5'} stroke={dc} strokeWidth={isInact?1:1.5} strokeDasharray={isInact?"3,2":"none"}/>
                            <text x={dx} y={ry+1} textAnchor="middle" dominantBaseline="middle" fontSize="11" opacity={isInact?0.4:1}>{d.icon||'📱'}</text>
                            <text x={dx} y={ry+22} textAnchor="middle" fontSize="7" fill="var(--textdim)">{(d.friendly_name||d.name).slice(0,9)}</text>
                          </g>
                        );
                      })}
                    </g>
                  );
                })}
              </g>
            )}
            {lan.devs.length===0&&(<text x={LAN_X+HUB_W+18} y={lanY+4} fontSize="8" fill="var(--textdim)" opacity="0.45">— none —</text>)}
          </g>
        );
      })}
    </svg>
  );
}

function LoginScreen({onLogin}){
  const[user,setUser]=useState('');
  const[pass,setPass]=useState('');
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);
  const handleLogin=async()=>{
    if(!pass){setErr('Enter password');return}
    setBusy(true);setErr('');
    try{
      const r=await fetch(`${API}/auth/login`,{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username:user,password:pass})});
      if(r.ok){
        const data=await r.json();
        if(data.token){window._zt_token=data.token;sessionStorage.setItem('zt_token',data.token);}
        onLogin();
      }else{const d=await r.json();setErr(d.detail||'Invalid credentials')}
    }catch(e){setErr('Connection failed')}
    finally{setBusy(false)}
  };
  return(
    <div className="login-screen">
      <div className="login-logo">🛡</div>
      <div className="login-title">ZeroTrust</div>
      <div className="login-sub">Home Security Gateway</div>
      <div className="login-form">
        <input className="login-input" type="text" placeholder="Username"
          value={user} onChange={e=>setUser(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
        <input className="login-input" type="password" placeholder="Password"
          value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()} autoFocus/>
        {err&&<div className="login-error">{err}</div>}
        <button className="login-btn" onClick={handleLogin} disabled={busy}>
          {busy?'Signing in...':'Sign In'}
        </button>
      </div>
    </div>
  );
}

function GroupedAttackerAlert({alerts,allAlerts}){
  const groups={};
  alerts.forEach(a=>{
    const raw=a.raw||a.message||'';
    if(!raw.includes('EXTERNAL_ATTACKER')&&!raw.includes('ATTACKER DETECTED'))return;
    const ipMatch=raw.match(/Attacker\s*[:|]\s*([\d.]+)/i)||raw.match(/([\d]+\.[\d]+\.[\d]+\.[\d]+)/);
    const ip=ipMatch?ipMatch[1]:'Unknown';
    const key=ip+'|'+(a.timestamp||'');
    if(!groups[key])groups[key]={ip,key,alerts:[a],targets:new Set(),quarantined:[],time:a.timestamp};
    else groups[key].alerts.push(a);
    const tMatch=raw.match(/Targets?\s*[:|]\s*(\d+)/i);
    if(tMatch)for(let i=0;i<parseInt(tMatch[1]);i++)groups[key].targets.add(i);
  });
  Object.values(groups).forEach(g=>{
    g.targetIPs=new Set();
    g.alerts.forEach(a=>{
      const raw=a.raw||a.message||'';
      const allIPs=raw.match(/192\.168\.20\.\d+/g)||[];
      allIPs.forEach(ip=>g.targetIPs.add(ip));
    });
    const attackMs=g.time?new Date(g.time).getTime():0;
    if(attackMs&&allAlerts){
      allAlerts.forEach(a=>{
        const raw=a.raw||a.message||'';
        if(!raw.includes('QUARANTINED'))return;
        const aMs=a.timestamp?new Date(a.timestamp).getTime():0;
        if(aMs&&Math.abs(aMs-attackMs)<90000){
          const closestAttack=Object.values(groups).reduce((best,grp)=>{
            const gMs=grp.time?new Date(grp.time).getTime():0;
            const bMs=best?new Date(best.time||0).getTime():Infinity;
            return Math.abs(aMs-gMs)<Math.abs(aMs-bMs)?grp:best;
          },null);
          if(closestAttack&&closestAttack.key===g.key){g.quarantined.push(a);}
        }
      });
    }
  });
  const [expanded,setExpanded]=React.useState({});
  const toggle=k=>setExpanded(p=>({...p,[k]:!p[k]}));
  return Object.values(groups).sort((a,b)=>(b.time||'').localeCompare(a.time||'')).map(g=>(
    <div key={g.key||g.ip} className="alert-card alert-atk" style={{marginBottom:8}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>toggle(g.key||g.ip)}>
        <div>
          <span style={{fontSize:12,fontWeight:700,color:'var(--danger)'}}>🚨 EXTERNAL ATTACKER — {g.ip}</span>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{g.time} · {g.targetIPs.size||g.targets.size||'?'} IoT devices targeted · {g.quarantined.length} isolated</div>
        </div>
        <span style={{fontSize:16,color:'var(--muted)'}}>{expanded[g.key||g.ip]?'▲':'▼'}</span>
      </div>
      {expanded[g.key||g.ip]&&(
        <div style={{marginTop:8,borderTop:'1px solid var(--border)',paddingTop:8}}>
          {g.quarantined.length>0&&(

          {g.alerts.map((a,i)=>(
            <div key={i} style={{fontSize:11,color:'var(--textdim)',padding:'4px 0',borderBottom:i<g.alerts.length-1?'1px solid var(--border)':'none'}}>

              {cleanMsg(a.raw||a.message||'')}
            </div>
          ))}
        </div>
      )}
    </div>
  ));
}

function AlertsTab({alerts}){
  const[joinExp,setJoinExp]=React.useState({});
  const[restExp,setRestExp]=React.useState({});

  if(!alerts.length)return(
    <div className="empty"><div className="empty-icon">✅</div>No alerts — network is clean</div>
  );

  // Separate types
  const attackerAlerts=alerts.filter(a=>{
    const r=a.raw||a.message||'';
    return r.includes('EXTERNAL_ATTACKER')||r.includes('ATTACKER DETECTED');
  });
  const attackMs=attackerAlerts.map(a=>a.timestamp?new Date(a.timestamp).getTime():0).filter(Boolean);
  const isRelatedQuar=(a)=>{
    const r=a.raw||a.message||'';
    if(!r.includes('QUARANTINED'))return false;
    const t=a.timestamp?new Date(a.timestamp).getTime():0;
    return attackMs.some(at=>Math.abs(t-at)<90000);
  };
  const joinAlerts=alerts.filter(a=>(a.raw||a.message||'').includes('NEW DEVICE ON NETWORK'));
  const restAlerts=alerts.filter(a=>(a.raw||a.message||'').includes('DEVICE RESTORED'));
  const otherAlerts=alerts.filter(a=>{
    const r=a.raw||a.message||'';
    return !r.includes('EXTERNAL_ATTACKER')&&!r.includes('ATTACKER DETECTED')
           &&!r.includes('NEW DEVICE ON NETWORK')
           &&!r.includes('DEVICE RESTORED')
           &&!isRelatedQuar(a);
  });

  // Group joins by minute
  const joinGroups={};
  joinAlerts.forEach(a=>{
    const min=(a.timestamp||'').slice(0,16);
    if(!joinGroups[min])joinGroups[min]={time:a.timestamp,devices:[]};
    const devM=(a.raw||'').match(/Device\s*:\s*(\S+)/i);
    const ipM=(a.raw||'').match(/IP\s*:\s*([\d.]+)/i);
    if(devM)joinGroups[min].devices.push({name:devM[1],ip:ipM?ipM[1]:''});
  });

  // Group restores by minute
  const restGroups={};
  restAlerts.forEach(a=>{
    const min=(a.timestamp||'').slice(0,16);
    if(!restGroups[min])restGroups[min]={time:a.timestamp,devices:[]};
    const devM=(a.raw||'').match(/Device\s*:\s*(\S+)/i);
    const ipM=(a.raw||'').match(/IP\s*:\s*([\d.]+)/i);
    if(devM)restGroups[min].devices.push({name:devM[1],ip:ipM?ipM[1]:''});
  });

  // ALL types in ONE time-sorted list
  const allItems=[
    ...attackerAlerts.map(a=>({type:'atk',a,ts:a.timestamp||''})),
    ...Object.values(joinGroups).map(g=>({type:'join',g,ts:g.time||''})),
    ...Object.values(restGroups).map(g=>({type:'restore',g,ts:g.time||''})),
    ...otherAlerts.map(a=>({type:'other',a,ts:a.timestamp||''})),
  ].sort((x,y)=>(y.ts||'').localeCompare(x.ts||''));

  const _ls=sessionStorage.getItem('zt_alerts_seen')||'';
  const _uc=alerts.filter(a=>(a.timestamp||'')>_ls).length;

  return(
    <div className="alert-list">
      {_uc>0&&(
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
          marginBottom:8,padding:'8px 12px',background:'rgba(181,51,51,0.05)',
          borderRadius:8,border:'1px solid rgba(181,51,51,0.15)'}}>
          <span style={{fontSize:12,color:'var(--muted)'}}>{_uc} unread alert{_uc>1?'s':''}</span>
          <button onClick={()=>{
            sessionStorage.setItem('zt_alerts_seen',alerts[0]?.timestamp||new Date().toISOString().slice(0,19).replace('T',' '));
            window.dispatchEvent(new Event('storage'));
          }} style={{background:'var(--surface)',border:'1px solid var(--border)',color:'var(--muted2)',
            borderRadius:6,padding:'4px 10px',fontSize:11,cursor:'pointer'}}>✓ Mark all read</button>
        </div>
      )}
      {allItems.slice(0,80).map((item,i)=>{
        if(item.type==='atk')return(
          <GroupedAttackerAlert key={'atk'+i} alerts={[item.a]} allAlerts={alerts}/>
        );
        if(item.type==='join'){
          const g=item.g;
          const min=(g.time||'').slice(0,16);
          const single=g.devices.length===1;
          return(
            <div key={'j'+i} className="alert-card alert-join" style={{marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                cursor:single?'default':'pointer'}}
                onClick={()=>!single&&setJoinExp(p=>({...p,[min]:!p[min]}))}>
                <div>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--accent2)'}}>
                    🟢 {single?'NEW DEVICE JOINED':`${g.devices.length} NEW DEVICES JOINED`}
                  </span>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{g.time}</div>
                </div>
                {!single&&<span style={{fontSize:14,color:'var(--muted)'}}>{joinExp[min]?'▲':'▼'}</span>}
              </div>
              {(single||joinExp[min])&&(
                <div style={{marginTop:6,borderTop:'1px solid var(--border)',paddingTop:6}}>
                  {g.devices.map((d,j)=>(
                    <div key={j} style={{display:'flex',alignItems:'center',gap:8,
                      padding:'3px 0',fontSize:12,color:'var(--textdim)'}}>
                      <span style={{width:6,height:6,borderRadius:'50%',background:'var(--accent2)',
                        display:'inline-block',flexShrink:0}}/>
                      <span style={{fontWeight:600}}>{d.name}</span>
                      <span style={{fontFamily:'monospace',color:'var(--muted)',fontSize:11}}>{d.ip}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        }
        if(item.type==='restore'){
          const g=item.g;
          const min=(g.time||'').slice(0,16);
          const single=g.devices.length===1;
          return(
            <div key={'r'+i} className="alert-card" style={{borderLeft:'3px solid var(--accent2)',marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                cursor:single?'default':'pointer'}}
                onClick={()=>!single&&setRestExp(p=>({...p,[min]:!p[min]}))}>
                <div>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--accent2)'}}>
                    ✅ {single?'DEVICE RESTORED':`${g.devices.length} DEVICES RESTORED`}
                  </span>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{g.time}</div>
                </div>
                {!single&&<span style={{fontSize:14,color:'var(--muted)'}}>{restExp[min]?'▲':'▼'}</span>}
              </div>
              {(single||restExp[min])&&(
                <div style={{marginTop:6,borderTop:'1px solid rgba(0,255,136,0.1)',paddingTop:6}}>
                  {g.devices.map((d,j)=>(
                    <div key={j} style={{display:'flex',alignItems:'center',gap:8,
                      padding:'3px 0',fontSize:12,color:'var(--textdim)'}}>
                      <span style={{width:6,height:6,borderRadius:'50%',background:'var(--accent2)',
                        display:'inline-block',flexShrink:0}}/>
                      <span style={{fontWeight:600}}>{d.name}</span>
                      <span style={{fontFamily:'monospace',color:'var(--muted)',fontSize:11}}>{d.ip}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        }
        const type=parseAlertType(item.a.raw||'');
        const msg=cleanMsg(item.a.raw||item.a.message||'');
        return(
          <div key={'a'+i} className={`alert-card alert-${type}`} style={{marginBottom:8}}>
            <div className="alert-time">{item.a.timestamp}</div>
            <div className="alert-msg">{msg}</div>
          </div>
        );
      })}
    </div>
  );
}
function WhitelistPanel({devices,isAdmin}){
  const[rules,setRules]=React.useState([]);
  const[src,setSrc]=React.useState('');
  const[dst,setDst]=React.useState('');
  const[note,setNote]=React.useState('');
  const[msg,setMsg]=React.useState('');
  const[open,setOpen]=React.useState(false);
  const iotDevices=devices.filter(d=>!d.quarantined&&d.lan!=='c-devices');
  React.useEffect(()=>{authFetch('/api/whitelist').then(r=>r.ok?r.json():null).then(d=>d&&setRules(d.rules||[]));},[]);
  const addRule=async()=>{
    if(!src||!dst){setMsg('Select source and destination');return;}
    const r=await authFetch('/api/whitelist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({src,dst,note})});
    if(r.ok){const d=await r.json();setRules(prev=>[...prev,d.rule]);setSrc('');setDst('');setNote('');setMsg('✅ Rule added');setTimeout(()=>setMsg(''),3000);}
    else{const e=await r.json();setMsg('❌ '+(e.detail||'Failed'));}
  };
  const delRule=async(rule)=>{
    const r=await authFetch('/api/whitelist',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({src:rule.src,dst:rule.dst})});
    if(r.ok)setRules(prev=>prev.filter(x=>!(x.src===rule.src&&x.dst===rule.dst)));
  };
  return(
    <div className="zone-card" style={{marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>setOpen(p=>!p)}>
        <div style={{fontSize:15,fontWeight:700}}>📋 IoT Communication Whitelist</div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:11,background:'rgba(201,100,66,0.08)',color:'var(--accent)',padding:'2px 8px',borderRadius:8}}>{rules.length} rules</span>
          <span style={{fontSize:11,color:'var(--muted)'}}>{open?'▲':'▼'}</span>
        </div>
      </div>
      <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>Allow specific IoT devices to communicate with each other (overrides east-west block)</div>
      {open&&(
        <div style={{marginTop:12,borderTop:'1px solid var(--border)',paddingTop:12}}>
          {rules.length===0&&<div style={{fontSize:12,color:'var(--muted)',marginBottom:8}}>No rules yet — all IoT-to-IoT traffic is blocked by default</div>}
          {rules.map((r,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 0',borderBottom:'1px solid var(--border)',fontSize:13}}>
              <span style={{fontWeight:600,color:'var(--accent)',fontSize:13}}>{r.src}</span>
              <span style={{color:'var(--muted)',margin:'0 6px'}}>→</span>
              <span style={{fontWeight:600,color:'var(--accent2)',fontSize:13}}>{r.dst}</span>
              <span style={{flex:1,fontSize:11,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis'}}>{r.note}</span>
              {isAdmin&&<button onClick={()=>delRule(r)} style={{background:'rgba(181,51,51,0.1)',color:'var(--danger)',border:'1px solid rgba(181,51,51,0.2)',borderRadius:6,padding:'3px 10px',fontSize:12,cursor:'pointer'}}>✕</button>}
            </div>
          ))}
          {isAdmin&&(
            <div style={{marginTop:12}}>
              <div style={{fontSize:12,fontWeight:600,color:'var(--textdim)',marginBottom:8}}>Add New Rule (Admin only)</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                <select value={src} onChange={e=>setSrc(e.target.value)} style={{background:'var(--surface)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 10px',fontSize:13}}>
                  <option value=''>Source device...</option>
                  {iotDevices.map(d=><option key={d.name} value={d.name}>{d.friendly_name||d.name} ({d.ip})</option>)}
                </select>
                <select value={dst} onChange={e=>setDst(e.target.value)} style={{background:'var(--surface)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 10px',fontSize:13}}>
                  <option value=''>Destination device...</option>
                  {iotDevices.map(d=><option key={d.name} value={d.name}>{d.friendly_name||d.name} ({d.ip})</option>)}
                </select>
              </div>
              <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Note (e.g. envsensor → thermostat data sync)"
                style={{width:'100%',background:'var(--surface)',color:'var(--text)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 10px',fontSize:13,marginBottom:8,boxSizing:'border-box'}}/>
              <button onClick={addRule} style={{width:'100%',background:'var(--accent)',color:'#faf9f5',border:'none',borderRadius:8,padding:'10px',fontSize:14,fontWeight:700,cursor:'pointer'}}>+ Add Whitelist Rule</button>
              {msg&&<div style={{marginTop:6,fontSize:12,color:msg.startsWith('✅')?'var(--accent2)':'var(--danger)'}}>{msg}</div>}
            </div>
          )}
          {!isAdmin&&<div style={{marginTop:8,fontSize:11,color:'var(--muted)',fontStyle:'italic'}}>🔒 Admin login required to add or remove rules</div>}
        </div>
      )}
    </div>
  );
}

                {/* Score deduction badges */}
                {sel.score_reasons?.length>0&&(
                  <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)'}}>
                    <div style={{fontSize:10,color:'var(--muted)',marginBottom:6}}>SCORE DEDUCTIONS</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                      {sel.score_reasons.map((r,i)=>{
                        const sev=r.includes('50')||r.includes('40')||r.includes('35');
                        return(
                          <span key={i} style={{padding:'2px 7px',borderRadius:5,fontSize:10,
                            fontWeight:600,
                            background:sev?'rgba(181,51,51,0.1)':'rgba(201,138,66,0.1)',
                            color:sev?'var(--danger)':'var(--warn)',
                            border:`1px solid ${sev?'rgba(181,51,51,0.25)':'rgba(201,138,66,0.25)'}`}}>
                            {r}
                          </span>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}


function NetworkTab({devices,onSelect,isAdmin}){
  const[expanded,setExpanded]=useState(null);
  const subnet=ip=>ip?ip.split('.').slice(0,3).join('.')+'.0/24':null;
  const lans={
    'IoT Network':{devices:devices.filter(d=>!d.quarantined&&d.lan!=='c-devices'),color:'var(--accent)',subnet:(()=>{const d=devices.find(x=>!x.quarantined&&x.lan==='iot-lan');return subnet(d?.ip)||'192.168.20.0/24';})(),icon:'📶'},
    'Isolated Zone':{devices:devices.filter(d=>d.quarantined),color:'var(--danger)',subnet:(()=>{const d=devices.find(x=>x.quarantined);return subnet(d?.ip)||'192.168.30.0/24';})(),icon:'🔒'},
    'C-Devices':{devices:devices.filter(d=>d.lan==='c-devices'),color:'var(--accent2)',subnet:(()=>{const d=devices.find(x=>x.lan==='c-devices');return subnet(d?.ip)||'192.168.10.0/24';})(),icon:'💻'},
  };
  return(
    <div>
      <div className="chart-card">
        <div className="chart-title"><span>Network Topology</span></div>
        <NetworkMap devices={devices}/>
      </div>
      <DeviceHistoryPanel devices={devices} onSelect={onSelect}/>
      <WhitelistPanel devices={devices} isAdmin={isAdmin}/>
      {Object.entries(lans).map(([name,{devices:devs,color,subnet:sn,icon}])=>{
        const scores=devs.map(d=>calcScore(d));
        const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;
        const isOpen=expanded===name;
        return(
          <div key={name} className="zone-card" style={{borderLeft:`4px solid ${color}`,cursor:'pointer',userSelect:'none'}} onClick={()=>setExpanded(isOpen?null:name)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div>
                <div style={{fontSize:15,fontWeight:700}}>{icon} {name}</div>
                <div style={{fontSize:12,color:'var(--muted)',fontFamily:'monospace'}}>{sn}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{background:`${color}22`,color,borderRadius:8,padding:'4px 12px',fontSize:20,fontWeight:800}}>{devs.length}</div>
                <span style={{fontSize:11,color:'var(--muted)',transition:'transform 0.2s',display:'inline-block',transform:isOpen?'rotate(180deg)':'rotate(0deg)'}}>▼</span>
              </div>
            </div>
            {avg!==null&&(
              <div>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,fontSize:12,color:'var(--muted)'}}>
                  <span>Average Trust</span><span style={{color:scoreColor(avg),fontWeight:700}}>{avg}</span>
                </div>
                <div style={{height:5,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${avg}%`,background:scoreColor(avg),borderRadius:3,transition:'width 0.5s'}}/>
                </div>
              </div>
            )}
            {devs.length===0&&<div style={{color:'var(--muted)',fontSize:12,marginTop:4}}>No devices in this zone</div>}
            {isOpen&&devs.length>0&&(
              <div style={{marginTop:12,borderTop:`1px solid ${color}33`,paddingTop:10}} onClick={e=>e.stopPropagation()}>
                {devs.map(d=>{
                  const s=calcScore(d);
                  return(
                    <div key={d.name} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 6px',borderBottom:'1px solid var(--border)',cursor:'pointer',borderRadius:6,transition:'background 0.12s'}}
                      onClick={()=>onSelect&&onSelect(d)}
                      onMouseEnter={e=>e.currentTarget.style.background='rgba(201,100,66,0.05)'}
                      onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                      <span style={{fontSize:20,flexShrink:0}}>{d.icon||'📱'}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.friendly_name||d.name}</div>
                        <div style={{fontSize:11,color:'var(--muted)',fontFamily:'monospace'}}>{d.ip}</div>
                      </div>
                      <span style={{fontSize:13,fontWeight:700,color:scoreColor(s),flexShrink:0,background:`${scoreColor(s)}18`,padding:'2px 8px',borderRadius:6}}>{s}</span>
                      <span style={{fontSize:11,color:'var(--muted)',flexShrink:0}}>›</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function decodeJwtRole(){
  try{
    const token=window._zt_token||sessionStorage.getItem('zt_token')||'';
    if(!token)return'viewer';
    const payload=token.split('.')[1];
    const pad=payload.length%4;
    const b64=payload+(pad?'='.repeat(4-pad):'');
    const data=JSON.parse(atob(b64.replace(/-/g,'+').replace(/_/g,'/')));
    return data.role||'viewer';
  }catch(e){return'viewer';}
}

function App(){
  const[authed,setAuthed]=useState(false);
  const[userRole,setUserRole]=useState('viewer');
  const isAdmin=userRole==='admin';
  const[checking,setChecking]=useState(true);
  const[tab,setTab]=useState('devices');
  const[devices,setDevices]=useState([]);
  const[alerts,setAlerts]=useState([]);
  const[loading,setLoading]=useState(null);
  const[selected,setSelected]=useState(null);
  const[fetching,setFetching]=useState(true);
  const[wsOk,setWsOk]=useState(false);
  const[ctrlOk,setCtrlOk]=useState(null);
  const[lastCycle,setLastCycle]=useState('');
  const[showPwChange,setShowPwChange]=useState(false);
  const[pwForm,setPwForm]=useState({current:'',newPw:'',confirm:''});
  const[pwMsg,setPwMsg]=useState('');
  const[pwBusy,setPwBusy]=useState(false);

  useEffect(()=>{const saved=sessionStorage.getItem('zt_token');if(saved)window._zt_token=saved;},[]);

  useEffect(()=>{
    authFetch(`${API}/api/devices`)
      .then(r=>{if(r.ok)setAuthed(true)})
      .catch(()=>{})
      .finally(()=>setChecking(false));
  },[]);

  const fetchAll=useCallback(async()=>{
    try{
      const[dr,ar]=await Promise.all([
        authFetch(`${API}/api/devices`).then(r=>r.ok?r.json():null),
        authFetch(`${API}/api/alerts?tail=100`).then(r=>r.ok?r.json():null),
      ]);
      try{
        const sr=await authFetch(`${API}/api/status`);
        if(sr.ok){const sd=await sr.json();const lastTs=sd.last_cycle_at;if(lastTs){const diffSec=(Date.now()-new Date(lastTs).getTime())/1000;setCtrlOk(diffSec<20);setLastCycle(lastTs.slice(11,19));}}
      }catch(e){setCtrlOk(false);}
      if(dr){setDevices((dr.devices||[]).map(enrich));setUserRole(decodeJwtRole());}
      if(ar)setAlerts(ar.alerts||[]);
    }catch(e){}
    finally{setFetching(false)}
  },[]);

  useEffect(()=>{if(!authed)return;fetchAll();const t=setInterval(fetchAll,8000);return()=>clearInterval(t);},[authed,fetchAll]);

  useEffect(()=>{
    if(!authed)return;
    const proto=location.protocol==='https:'?'wss':'ws';
    const ws=new WebSocket(`${proto}://${location.host}/ws/live`);
    ws.onopen=()=>setWsOk(true);
    ws.onclose=()=>setWsOk(false);
    ws.onmessage=e=>{
      try{
        const data=JSON.parse(e.data);
        if(data.type==='alert'){
          setAlerts(prev=>[{raw:data.message,timestamp:(data.timestamp||'').slice(0,19).replace('T',' '),message:data.message},...prev].slice(0,100));
          fetchAll();
        }
      }catch{}
    };
    return()=>ws.close();
  },[authed,fetchAll]);

  const handleAction=async(action,name)=>{
    setLoading(name);
    try{const r=await authFetch(`${API}/api/${action}/${name}`,{method:'POST'});if(r.ok){setTimeout(fetchAll,1500);setSelected(null)}}
    catch(e){}
    finally{setLoading(null)}
  };

  if(checking)return<div className="loading" style={{height:'100vh'}}><div className="spinner"/></div>;
  if(!authed)return<LoginScreen onLogin={()=>{setAuthed(true);fetchAll()}}/>;

  const quarCount=devices.filter(d=>d.quarantined).length;
  const atRisk=devices.filter(d=>!d.quarantined&&calcScore(d)<60).length;
  const trusted=devices.length-quarCount-atRisk;
  const handlePwChange=async()=>{
    if(pwForm.newPw!==pwForm.confirm){setPwMsg('❌ Passwords do not match');return;}
    if(pwForm.newPw.length<8){setPwMsg('❌ Min 8 characters');return;}
    if(!/[A-Z]/.test(pwForm.newPw)){setPwMsg('❌ Need at least one uppercase letter');return;}
    if(!/[0-9]/.test(pwForm.newPw)){setPwMsg('❌ Need at least one number');return;}
    setPwBusy(true);setPwMsg('');
    try{
      const r=await authFetch(`${API}/auth/change-password`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({current_password:pwForm.current,new_password:pwForm.newPw,confirm_password:pwForm.confirm})
      });
      const d=await r.json();
      if(r.ok){setPwMsg('✅ '+d.message);setTimeout(()=>setShowPwChange(false),1500);}
      else setPwMsg('❌ '+(d.detail||'Failed'));
    }catch(e){setPwMsg('❌ Connection failed');}
    finally{setPwBusy(false);}
  };

  return(
    <div className="app">
      <header className="header">
        <div className="header-logo">
          <div className="header-icon">🛡</div>
          <div>
            <div className="header-title">ZeroTrust</div>
            <div className="header-sub" style={{color:ctrlOk===false?'var(--danger)':ctrlOk?'var(--accent2)':'var(--muted)'}}>
              {ctrlOk===false?'⏸ Controller Paused':ctrlOk?`● Live${lastCycle?' · '+lastCycle:''}`:wsOk?'● Live':'○ Polling'}
            </div>
          </div>
        </div>
        <div className={`header-status ${ctrlOk===false?'status-alert':quarCount>0||atRisk>0?'status-alert':'status-secure'}`}>
          <div className={`pulse ${ctrlOk===false?'pulse-red':quarCount>0||atRisk>0?'pulse-red':'pulse-green'}`}/>
          {ctrlOk===false?'⏸ PAUSED':quarCount>0?`${quarCount} Isolated`:atRisk>0?`${atRisk} At Risk`:'Secure'}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0,marginLeft:8}}>
          <button onClick={()=>{setPwForm({current:'',newPw:'',confirm:''});setPwMsg('');setShowPwChange(true);}}
            style={{background:'var(--surface)',border:'1px solid var(--border)',color:'var(--muted2)',borderRadius:8,padding:'5px 10px',fontSize:11,cursor:'pointer'}}>
            🔑 Change PW
          </button>
          <button onClick={()=>{window._zt_token='';sessionStorage.removeItem('zt_token');window.location.reload();}}
            style={{background:'var(--surface)',border:'1px solid var(--border)',color:'var(--muted2)',borderRadius:8,padding:'5px 10px',fontSize:11,cursor:'pointer'}}>
            Sign out
          </button>
        </div>
        {showPwChange&&(
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center'}}
               onClick={e=>e.target===e.currentTarget&&setShowPwChange(false)}>
            <div style={{background:'#faf9f5',border:'1px solid var(--border)',borderRadius:16,padding:28,width:320,maxWidth:'90vw',boxShadow:'0 4px 32px rgba(0,0,0,0.12)'}}>
              <div style={{fontSize:16,fontWeight:700,marginBottom:16,color:'var(--text)'}}>🔑 Change Password</div>
              {[['Current password','current','password'],['New password','newPw','password'],['Confirm new password','confirm','password']].map(([lbl,key,type])=>(
                <div key={key} style={{marginBottom:10}}>
                  <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>{lbl}</div>
                  <input type={type} value={pwForm[key]}
                    onChange={e=>setPwForm(p=>({...p,[key]:e.target.value}))}
                    style={{width:'100%',background:'#ffffff',border:'1px solid var(--border)',borderRadius:8,padding:'9px 12px',fontSize:14,color:'var(--text)',outline:'none',boxSizing:'border-box'}}/>
                </div>
              ))}
              <div style={{fontSize:10,color:'var(--muted)',marginBottom:12}}>Min 8 chars · 1 uppercase · 1 number</div>
              {pwMsg&&<div style={{fontSize:12,marginBottom:10,color:pwMsg.startsWith('✅')?'var(--accent2)':'var(--danger)'}}>{pwMsg}</div>}
              <div style={{display:'flex',gap:8}}>
                <button onClick={handlePwChange} disabled={pwBusy} style={{flex:1,background:'var(--accent)',color:'#faf9f5',border:'none',borderRadius:8,padding:'10px',fontSize:14,fontWeight:700,cursor:'pointer'}}>
                  {pwBusy?'Saving...':'Save'}
                </button>
                <button onClick={()=>setShowPwChange(false)} style={{flex:1,background:'var(--border)',border:'1px solid var(--border)',color:'var(--muted2)',borderRadius:8,padding:'10px',fontSize:14,cursor:'pointer'}}>
                  Cancel
                </button>
              </div>
            </div>
          </div>
        )}
      </header>

      <div className="content">
        <div className="stat-row">
          <div className="stat-card"><div className="stat-val color-blue">{devices.length}</div><div className="stat-label">Total</div></div>
          <div className="stat-card"><div className="stat-val color-green">{trusted}</div><div className="stat-label">Safe</div></div>
          <div className="stat-card"><div className="stat-val color-warn">{atRisk}</div><div className="stat-label">Risk</div></div>
          <div className="stat-card"><div className="stat-val color-danger">{quarCount}</div><div className="stat-label">Isolated</div></div>
        </div>
        {fetching
          ?<div className="loading"><div className="spinner"/>Loading...</div>
          :tab==='devices'?<DevicesTab devices={devices} onSelect={setSelected}/>
          :tab==='alerts'?<AlertsTab alerts={alerts}/>
          :tab==='charts'?<ChartsTab devices={devices} alerts={alerts}/>
          :<NetworkTab devices={devices} onSelect={setSelected} isAdmin={isAdmin}/>
        }
      </div>

      <nav className="bottom-nav">
        {(()=>{
          const _ls=sessionStorage.getItem('zt_alerts_seen')||'';
          const _ur=alerts.filter(a=>(a.timestamp||'')>_ls).length;
          return[
            {id:'devices',icon:'📱',label:'Devices'},
            {id:'alerts',icon:'🔔',label:'Alerts'},
            {id:'charts',icon:'📊',label:'Charts'},
            {id:'network',icon:'🌐',label:'Network'},
          ].map(({id,icon,label})=>(
            <button key={id} className={`nav-item${tab===id?' active':''}`}
              onClick={()=>{setTab(id);if(id==='alerts'){sessionStorage.setItem('zt_alerts_seen',alerts[0]?.timestamp||new Date().toISOString().slice(0,19).replace('T',' '));}}}
              style={{position:'relative'}}>
              <span className="nav-icon">{icon}</span>
              <span className="nav-label">{label}</span>
              {id==='alerts'&&_ur>0&&tab!=='alerts'&&(
                <span style={{position:'absolute',top:2,right:14,minWidth:16,height:16,borderRadius:8,background:'var(--danger)',color:'#fff',fontSize:10,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px',border:'2px solid var(--bg)'}}>{_ur>99?'99+':_ur}</span>
              )}
            </button>
          ));
        })()}
      </nav>

      {selected&&<DeviceSheet device={selected} onClose={()=>setSelected(null)} onAction={handleAction} loading={loading}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
